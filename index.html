<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TermAI - Professional Assistant</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="app-container">
        <!-- Overlay for Mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="logo-icon" style="font-size: 1.5rem;">🤖</span>
                <h2>TermAI</h2>
            </div>
            
            <div class="sidebar-actions">
                <button class="new-chat-btn" id="newChatBtn">
                    <i data-lucide="plus"></i>
                    <span>New chat</span>
                </button>
            </div>

            <div class="search-box">
                <i data-lucide="search"></i>
                <input type="text" id="chatSearch" placeholder="Search chats" autocomplete="off">
            </div>

            <div class="recents-section">
                <h3 class="section-title">Recents</h3>
                <div class="recent-list" id="recentList">
                    <!-- Dynamic recent chats will go here -->
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar-small">U</div>
                    <span>User</span>
                </div>
                <button class="icon-btn" id="themeToggleBtn" title="Toggle Theme"><i data-lucide="sun"></i></button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <header class="chat-header">
                <button class="icon-btn mobile-menu-btn" id="mobileMenuBtn" title="Menu"><i data-lucide="menu"></i></button>
            </header>
            
            <div class="chat-scroll-area" id="chatHistory">
                <!-- Welcome Message -->
                <div class="welcome-screen" id="welcomeScreen">
                    <h1>Welcome to TermAI</h1>
                </div>
            </div>
            
            <div class="input-area">
                <div class="input-wrapper">
                    <div id="attachmentPreview" class="attachment-preview hidden">
                        <i data-lucide="file" class="attachment-icon"></i>
                        <span id="attachmentName">filename.png</span>
                        <button type="button" id="removeAttachmentBtn" title="Remove attachment"><i data-lucide="x"></i></button>
                    </div>
                    <form id="chatForm" class="input-form">
                        <input type="file" id="fileInput" accept="image/*,.txt,.log,.md" style="display: none;">
                        <button type="button" class="icon-btn attach-btn" id="attachBtn" title="Upload file"><i data-lucide="plus"></i></button>
                        <input type="text" id="chatInput" placeholder="Ask TermAI" autocomplete="off">
                        <button type="submit" id="submitBtn" class="send-btn hidden" title="Send message">
                            <i data-lucide="send"></i>
                        </button>
                        <button type="button" id="stopBtn" class="send-btn hidden" title="Stop generating" style="background: #ef4444; color: white;">
                            <i data-lucide="square"></i>
                        </button>
                        <button type="button" class="icon-btn mic-btn" id="micBtn" title="Use microphone"><i data-lucide="mic"></i></button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    
    <script src="script.js"></script>
</body>
</html>
