<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TermAI - Professional Assistant</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Floating Blobs Background -->
    <div class="bg-gradient">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <i data-lucide="terminal-square"></i>
                <h2>TermAI Assistant</h2>
            </div>
            
            <div class="search-box">
                <i data-lucide="search"></i>
                <input type="text" id="commandSearch" placeholder="Search snippets..." autocomplete="off">
            </div>

            <h3 class="section-title">Quick Commands</h3>
            <div class="command-list" id="commandList"></div>
            
            <div class="sidebar-footer">
                <div class="status-indicator online"></div>
                <span>Core Online</span>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container glass-panel">
            <header class="chat-header">
                <div class="model-info">
                    <i data-lucide="terminal" class="model-icon"></i>
                    <div>
                        <h1>TermAI Core</h1>
                        <p>Command Line Interface Engine</p>
                    </div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="icon-btn" id="themeToggleBtn" title="Toggle Light/Dark Theme"><i data-lucide="sun"></i></button>
                    <button class="icon-btn" title="Settings (Coming Soon)"><i data-lucide="settings"></i></button>
                </div>
            </header>
            
            <div class="chat-scroll-area" id="chatHistory">
                <!-- Welcome Message -->
                <div class="message ai-message fade-in">
                    <div class="avatar ai-avatar"><i data-lucide="bot"></i></div>
                    <div class="message-bubble">
                        <p>Hello! I am your TermAI CLI assistant. How can I help you streamline your workflow today?</p>
                    </div>
                </div>
            </div>
            
            <div class="input-area">
                <div id="attachmentPreview" class="attachment-preview hidden">
                    <i data-lucide="file" class="attachment-icon"></i>
                    <span id="attachmentName">filename.png</span>
                    <button type="button" id="removeAttachmentBtn" title="Remove attachment"><i data-lucide="x"></i></button>
                </div>
                <form id="chatForm" class="input-form">
                    <input type="file" id="fileInput" accept="image/*,.txt,.log,.md" style="display: none;">
                    <button type="button" class="icon-btn attach-btn" id="attachBtn" title="Attach photo or log"><i data-lucide="paperclip"></i></button>
                    <input type="text" id="chatInput" placeholder="Ask me for a command, script, or configuration..." autocomplete="off">
                    <button type="submit" id="submitBtn" class="send-btn">
                        <i data-lucide="send-horizonal"></i>
                    </button>
                </form>
            </div>
        </main>
    </div>
    
    <div id="toastContainer" class="toast-container"></div>
    
    <script src="script.js"></script>
</body>
</html>
